---
- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Ensure all cluster nodes resolve via /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "{{ hostvars[item].ansible_host }} {{ item }}"
    state: present
  loop: "{{ groups['k8s_cluster'] }}"

- name: Install chrony for time sync
  ansible.builtin.apt:
    name: chrony
    state: present
    update_cache: true
  register: apt_result
  retries: 3
  delay: 5
  until: apt_result is succeeded

- name: Ensure chrony is enabled and running
  ansible.builtin.systemd:
    name: chrony
    enabled: true
    state: started

# Default 128 max_user_instances is easy to exhaust once several pods'
# processes on a node each hold their own file watchers (e.g. Jellyfin's
# ASP.NET config-reload FileSystemWatcher) -- hit this for real as a
# jellyfin CrashLoopBackOff after a routine node reboot surfaced how low
# the untouched default was (2026-07-20).
- name: Raise inotify limits so node reboots don't crash-loop file-watching pods
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_set: true
    state: present
    reload: true
  loop:
    - { name: fs.inotify.max_user_instances, value: "1024" }
    - { name: fs.inotify.max_user_watches, value: "1048576" }

- name: Confirm swap is off (should already be disabled by the Packer image)
  ansible.builtin.command: swapon --summary
  register: swap_check
  changed_when: false

- name: Fail if swap is active
  ansible.builtin.fail:
    msg: "Swap is active on {{ inventory_hostname }} — kubelet requires swap disabled"
  when: swap_check.stdout | trim | length > 0
