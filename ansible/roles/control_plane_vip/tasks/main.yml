---
- name: Install keepalived
  apt:
    name: keepalived
    state: present
    update_cache: true

- name: Deploy apiserver health check script
  template:
    src: check_apiserver.sh.j2
    dest: /etc/keepalived/check_apiserver.sh
    owner: root
    group: root
    mode: "0755"

- name: Deploy keepalived config
  template:
    src: keepalived.conf.j2
    dest: /etc/keepalived/keepalived.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart keepalived

- name: Ensure keepalived is enabled and started
  systemd:
    name: keepalived
    enabled: true
    state: started
