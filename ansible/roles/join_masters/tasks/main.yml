---
# Runs against the control_plane_join group (all masters except the first).
# Guarded on /etc/kubernetes/kubelet.conf so it's safe to re-run.

- name: Check whether this node has already joined the cluster
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf

- name: Read join commands generated by kubeadm_init
  ansible.builtin.set_fact:
    join_commands: "{{ lookup('file', playbook_dir + '/.join-commands.sh') }}"
  delegate_to: localhost
  become: false
  when: not kubelet_conf.stat.exists

- name: Extract control-plane join command
  ansible.builtin.set_fact:
    control_plane_join_command: "{{ join_commands | regex_search('CONTROL_PLANE_JOIN_COMMAND=\"(.*)\"', '\\1') | first }}"
  when: not kubelet_conf.stat.exists

- name: Join this node to the control plane
  ansible.builtin.command: "{{ control_plane_join_command }}"
  when: not kubelet_conf.stat.exists
