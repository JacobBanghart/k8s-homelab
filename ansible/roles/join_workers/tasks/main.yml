---
# Runs against the workers group. Guarded on /etc/kubernetes/kubelet.conf so
# it's safe to re-run.

- name: Check whether this node has already joined the cluster
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf

- name: Read join commands generated by kubeadm_init
  ansible.builtin.set_fact:
    join_commands: "{{ lookup('file', playbook_dir + '/.join-commands.sh') }}"
  delegate_to: localhost
  become: false
  when: not kubelet_conf.stat.exists

- name: Extract worker join command
  ansible.builtin.set_fact:
    worker_join_command: "{{ join_commands | regex_search('WORKER_JOIN_COMMAND=\"(.*)\"', '\\1') | first }}"
  when: not kubelet_conf.stat.exists

- name: Join this node to the cluster as a worker
  ansible.builtin.command: "{{ worker_join_command }}"
  when: not kubelet_conf.stat.exists
