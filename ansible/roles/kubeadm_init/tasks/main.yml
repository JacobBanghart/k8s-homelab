---
# Runs only against the control_plane_init host (see playbook.yml). Guarded
# on /etc/kubernetes/admin.conf so it's safe to re-run the whole playbook
# without re-initializing an already-bootstrapped control plane.

- name: Check whether this node is already a control-plane member
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: admin_conf

- name: Run kubeadm init
  ansible.builtin.command: >
    kubeadm init
    --control-plane-endpoint={{ control_plane_endpoint }}
    --upload-certs
    --pod-network-cidr={{ pod_network_cidr }}
  when: not admin_conf.stat.exists
  register: kubeadm_init_result

- name: Create .kube directory for the ansible user
  ansible.builtin.file:
    path: /home/ansible/.kube
    state: directory
    owner: ansible
    group: ansible
    mode: "0755"

- name: Copy admin.conf to ansible user's kubeconfig
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ansible/.kube/config
    owner: ansible
    group: ansible
    mode: "0600"
    remote_src: true

- name: Generate a fresh certificate key for control-plane joins
  ansible.builtin.command: kubeadm init phase upload-certs --upload-certs
  register: upload_certs_result
  changed_when: false

- name: Extract certificate key from upload-certs output
  ansible.builtin.set_fact:
    certificate_key: "{{ upload_certs_result.stdout_lines[-1] }}"

- name: Generate worker join command
  ansible.builtin.command: kubeadm token create --print-join-command
  register: worker_join_command
  changed_when: false

- name: Generate control-plane join command
  ansible.builtin.command: kubeadm token create --print-join-command --certificate-key {{ certificate_key }}
  register: cp_join_command
  changed_when: false

- name: Persist join commands on the ansible controller for later stages
  ansible.builtin.copy:
    content: |
      WORKER_JOIN_COMMAND="{{ worker_join_command.stdout }}"
      CONTROL_PLANE_JOIN_COMMAND="{{ cp_join_command.stdout }}"
    dest: "{{ playbook_dir }}/.join-commands.sh"
    mode: "0600"
  delegate_to: localhost
  become: false
