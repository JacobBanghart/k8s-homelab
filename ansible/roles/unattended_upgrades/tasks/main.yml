---
# The golden image already ships with unattended-upgrades enabled,
# security-only origins, and kubeadm/kubectl/kubelet held -- this role
# makes that explicit and idempotent (asserted by Ansible, not just an
# implicit property of however the image happened to be built), so it
# survives a rebuild from a different base image too.

- name: Ensure unattended-upgrades is installed
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Enable periodic apt updates and unattended upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    owner: root
    group: root
    mode: "0644"

- name: Ensure apt-daily timers are enabled and started
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - apt-daily.timer
    - apt-daily-upgrade.timer

# Explicit, not relying on the package default (commented-out) staying
# false forever -- a kernel/reboot-requiring update auto-rebooting a
# control-plane or worker node without draining it first would be a real
# outage, not just an inconvenience. See docs/runbook.md for the manual
# drain-reboot-uncordon procedure this requires instead.
- name: Ensure automatic reboot is explicitly disabled
  ansible.builtin.lineinfile:
    path: /etc/apt/apt.conf.d/50unattended-upgrades
    regexp: '^\s*//?\s*Unattended-Upgrade::Automatic-Reboot\b.*'
    line: 'Unattended-Upgrade::Automatic-Reboot "false";'
    insertafter: EOF

# Belt-and-suspenders: unattended-upgrades already skips held packages,
# but assert the holds explicitly too so they don't silently disappear
# after e.g. a package reinstall.
- name: Ensure kubeadm/kubectl/kubelet stay held
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubeadm
    - kubectl
    - kubelet
