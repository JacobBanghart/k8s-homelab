apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-bootstrap
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: k8s-homelab-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: k8s-homelab-ca
  secretName: k8s-homelab-ca-secret
  duration: 87600h # 10y
  renewBefore: 8760h # 1y
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-bootstrap
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: k8s-homelab-ca-issuer
spec:
  ca:
    secretName: k8s-homelab-ca-secret
