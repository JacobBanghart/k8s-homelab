# Real, browser-trusted certs via Let's Encrypt + Cloudflare DNS-01,
# replacing the old self-signed k8s-homelab-ca-issuer for anything
# Traefik-terminated (Vault's own internal listener cert is unrelated --
# still uses the self-signed CA in ca.yaml). Same Cloudflare account/zone
# flux's Traefik already uses -- credential copied via kubectl into this
# namespace (cert-manager's ClusterIssuer DNS-01 solver secretRef always
# resolves against cert-manager's own namespace), not committed to git.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-cloudflare
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: jacobmbanghart@gmail.com
    privateKeySecretRef:
      name: letsencrypt-cloudflare-account-key
    solvers:
      - dns01:
          cloudflare:
            email: jacobmbanghart@gmail.com
            apiKeySecretRef:
              name: cloudflare-credentials
              key: apiKey
