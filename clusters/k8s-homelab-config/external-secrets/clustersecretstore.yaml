# Trusts Vault's internal CA (k8s-homelab-ca-cert, public cert only -- same
# pattern as vault/serverstransport.yaml) since Vault's in-cluster Service
# uses a self-signed internal cert, not the external Let's Encrypt one.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "https://vault.vault.svc.cluster.local:8200"
      path: secret
      version: v2
      caProvider:
        type: Secret
        name: k8s-homelab-ca-cert
        key: ca.crt
        namespace: external-secrets
      auth:
        kubernetes:
          mountPath: kubernetes
          role: external-secrets
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
