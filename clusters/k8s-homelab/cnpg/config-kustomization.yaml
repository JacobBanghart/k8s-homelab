apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cnpg-config
  namespace: flux-system
spec:
  # Same chicken-and-egg as metallb-config/cert-manager-config: the
  # postgresql.cnpg.io Cluster CRD doesn't exist until the cnpg
  # HelmRelease itself has been reconciled, so the Cluster instance can't
  # live in the same flat apply -- reconciled as its own Kustomization so
  # a failed attempt only blocks itself and retries independently.
  interval: 10m
  retryInterval: 1m
  path: ./clusters/k8s-homelab-config/cnpg
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: flux-system
      namespace: flux-system
