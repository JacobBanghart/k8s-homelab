apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg
  namespace: cnpg-system
spec:
  interval: 10m
  chart:
    spec:
      chart: cloudnative-pg
      version: "0.29.0"
      sourceRef:
        kind: HelmRepository
        name: cnpg
        namespace: cnpg-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    resources:
      requests:
        cpu: "10m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"
