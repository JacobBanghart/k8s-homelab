# Migrated from dev cluster (Wave 1 of the dev->k8s-homelab migration,
# see docs/decisions.md). Stateless, no PVC, no secrets -- straight
# lift-and-shift. Real hostname used directly (not a temporary
# *.k8s-homelab.jacobbanghart.com one) since this is the actual app
# cutover, not a new service.
apiVersion: v1
kind: Namespace
metadata:
  name: excalidraw
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: excalidraw
  namespace: excalidraw
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: excalidraw
  template:
    metadata:
      labels:
        app: excalidraw
    spec:
      containers:
        - name: excalidraw
          image: excalidraw/excalidraw:sha-4bfc5bb
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              memory: "1024Mi"
              cpu: "1000m"
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: excalidraw
  namespace: excalidraw
spec:
  selector:
    app: excalidraw
  ports:
    - port: 80
      targetPort: 80
      name: excalidraw
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: excalidraw
  namespace: excalidraw
  annotations:
    # Public traffic cutover is a single router-level event (one shared
    # port-forward rule -> Traefik, not per-app DNS -- see
    # docs/decisions.md), not per-app. Keep this excluded from
    # external-dns until that real cutover happens, or it'll flip the
    # live public DNS record to this cluster before dev's Traefik is
    # actually taken out of the path -- already caused one live outage
    # this way, twice (once by hand, once by external-dns itself).
    external-dns.alpha.kubernetes.io/exclude: "true"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`excalidraw.jacobbanghart.com`)
      kind: Rule
      services:
        - name: excalidraw
          port: 80
  tls:
    secretName: excalidraw-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: excalidraw-tls
  namespace: excalidraw
spec:
  secretName: excalidraw-tls
  duration: 2160h # 90d
  renewBefore: 360h # 15d
  privateKey:
    algorithm: ECDSA
    size: 256
  dnsNames:
    - excalidraw.jacobbanghart.com
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
    group: cert-manager.io
