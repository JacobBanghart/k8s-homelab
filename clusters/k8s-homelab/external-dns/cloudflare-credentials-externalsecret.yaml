# Reuses the same Vault path as cert-manager/cloudflare-credentials-externalsecret.yaml
# (same Cloudflare account/credential, just a second consumer).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-credentials
  namespace: external-dns
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: cloudflare-credentials
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: cert-manager/cloudflare-credentials
