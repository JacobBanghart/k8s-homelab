# txtOwnerId is distinct from dev's own external-dns ("external-dns") so
# the two clusters' instances never fight over the same Cloudflare
# records during the migration -- policy: sync only ever touches records
# this instance's own TXT ownership records claim.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  interval: 10m
  chart:
    spec:
      chart: external-dns
      version: "1.21.1"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: external-dns
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    provider:
      name: cloudflare
    # k8s-homelab apps all expose via Traefik IngressRoute, not plain
    # Ingress -- traefik-proxy is the source that watches those.
    sources:
      - ingress
      - service
      - traefik-proxy
    domainFilters:
      - jacobbanghart.com
    policy: sync
    txtOwnerId: k8s-homelab
    extraArgs:
      - --cloudflare-dns-records-per-page=5000
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "7979"
      prometheus.io/path: "/metrics"
    env:
      - name: CF_API_KEY
        valueFrom:
          secretKeyRef:
            name: cloudflare-credentials
            key: apiKey
      - name: CF_API_EMAIL
        valueFrom:
          secretKeyRef:
            name: cloudflare-credentials
            key: email
    resources:
      requests:
        cpu: "10m"
        memory: "32Mi"
      limits:
        cpu: "100m"
        memory: "128Mi"
