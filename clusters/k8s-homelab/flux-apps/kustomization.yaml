apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-apps
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  path: ./clusters/k8s-homelab-apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-apps
    namespace: flux-system
  dependsOn:
    - name: flux-system
      namespace: flux-system
