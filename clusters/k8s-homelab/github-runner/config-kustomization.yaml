apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: github-runner-config
  namespace: flux-system
spec:
  # RunnerDeployment/HorizontalRunnerAutoscaler CRDs don't exist until
  # the actions-runner-controller HelmRelease is reconciled -- same
  # chicken-and-egg as cert-manager-config/metallb-config/
  # external-secrets-config.
  interval: 10m
  retryInterval: 1m
  path: ./clusters/k8s-homelab-config/github-runner
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: flux-system
      namespace: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: actions-runner-controller
      namespace: actions-runner-system
