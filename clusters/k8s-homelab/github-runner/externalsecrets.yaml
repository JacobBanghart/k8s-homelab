# Same GitHub App (id 3153938) installed on two different orgs --
# controller-manager-secret is the default installation ARC's own
# controller uses; ferrix-runner-secret is a second installation
# (ReclaimerGold org) that ferrix-runner's RunnerDeployment references
# directly via githubAPICredentialsFrom, since ARC 0.23.x's controller
# can't cross org boundaries with a single installation.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: controller-manager-secret
  namespace: actions-runner-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: controller-manager-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: github-runner/controller-manager-secret
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ferrix-runner-secret
  namespace: actions-runner-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: ferrix-runner-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: github-runner/ferrix-runner-secret
