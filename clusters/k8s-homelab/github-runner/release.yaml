apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: actions-runner-controller
  namespace: actions-runner-system
spec:
  interval: 10m
  chart:
    spec:
      chart: actions-runner-controller
      version: "0.23.7"
      sourceRef:
        kind: HelmRepository
        name: actions-runner-controller
        namespace: actions-runner-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    authSecret:
      create: false
      name: controller-manager-secret

    replicaCount: 1

    resources:
      limits:
        cpu: 500m
        memory: 500Mi
      requests:
        cpu: 100m
        memory: 128Mi

    # cert-manager exists on this cluster but ARC's own built-in webhook
    # cert rotation is simpler for this single controller replica --
    # matches dev's config, no functional need to switch.
    certManagerEnabled: false
