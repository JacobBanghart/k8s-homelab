# Cluster-admin-scoped UI (see rbac.yaml) -- basic-auth middleware added
# as a second layer in front of Headlamp's own token login (dev's copy of
# this app had no such layer; not carried forward here).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: headlamp
  namespace: headlamp
  annotations:
    # Internal admin tool, resolved via Pi-hole only -- keep it off
    # external-dns's public Cloudflare records.
    external-dns.alpha.kubernetes.io/exclude: "true"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`headlamp.k8s-homelab.jacobbanghart.com`)
      kind: Rule
      middlewares:
        - name: basic-auth
          namespace: traefik
      services:
        - name: headlamp
          port: 80
  tls:
    secretName: headlamp-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: headlamp-tls
  namespace: headlamp
spec:
  secretName: headlamp-tls
  duration: 2160h # 90d
  renewBefore: 360h # 15d
  privateKey:
    algorithm: ECDSA
    size: 256
  dnsNames:
    - headlamp.k8s-homelab.jacobbanghart.com
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
    group: cert-manager.io
