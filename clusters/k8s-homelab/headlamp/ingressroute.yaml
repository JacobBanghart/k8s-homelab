# Cluster-admin-scoped UI (see rbac.yaml) -- basic-auth middleware added
# as a second layer in front of Headlamp's own token login (dev's copy of
# this app had no such layer; not carried forward here).
#
# dashboard.jacobbanghart.com is dev's original public hostname for this
# app (real Cloudflare A record already existed, unchanged, pointing at
# the shared public IP -- the port-forward cutover routes it here now).
# Missed carrying this over during the initial Wave 0 migration, which
# only added the new headlamp.k8s-homelab.jacobbanghart.com name; broke
# dashboard.jacobbanghart.com until this fix. Split into two IngressRoute
# objects (the exclude annotation is resource-scoped, not per-Host-rule)
# so external-dns can actively manage dashboard.jacobbanghart.com like
# any other public app, while headlamp.k8s-homelab... stays Pi-hole-only.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: headlamp-internal
  namespace: headlamp
  annotations:
    external-dns.alpha.kubernetes.io/exclude: "true"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`headlamp.k8s-homelab.jacobbanghart.com`)
      kind: Rule
      middlewares:
        - name: basic-auth
          namespace: traefik
      services:
        - name: headlamp
          port: 80
  tls:
    secretName: headlamp-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: headlamp-public
  namespace: headlamp
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`dashboard.jacobbanghart.com`)
      kind: Rule
      middlewares:
        - name: basic-auth
          namespace: traefik
      services:
        - name: headlamp
          port: 80
  tls:
    secretName: headlamp-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: headlamp-tls
  namespace: headlamp
spec:
  secretName: headlamp-tls
  duration: 2160h # 90d
  renewBefore: 360h # 15d
  privateKey:
    algorithm: ECDSA
    size: 256
  dnsNames:
    - headlamp.k8s-homelab.jacobbanghart.com
    - dashboard.jacobbanghart.com
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
    group: cert-manager.io
