# Keys must be OIDC_CLIENT_ID / OIDC_CLIENT_SECRET / OIDC_ISSUER_URL /
# OIDC_SCOPES exactly -- the chart env-froms this whole secret into the
# container and references each key by name ($(OIDC_CLIENT_ID) etc in the
# container args), so a mismatched key name silently no-ops rather than
# erroring.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: headlamp-oidc
  namespace: headlamp
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: headlamp-oidc
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: headlamp/oidc
