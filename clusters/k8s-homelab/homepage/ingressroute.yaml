apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: demo-app
  namespace: homepage
  annotations:
    # Internal dashboard, resolved via Pi-hole only -- keep it off
    # external-dns's public Cloudflare records.
    external-dns.alpha.kubernetes.io/exclude: "true"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`demo-app.k8s-homelab.jacobbanghart.com`)
      kind: Rule
      services:
        - name: homepage
          port: 3000
  tls:
    secretName: demo-app-tls
