# Namespace renamed from demo-app to homepage (2026-07-19) to match
# what's actually running here -- hostname/DNS deliberately left as
# demo-app.k8s-homelab.jacobbanghart.com (unifi/pihole_dns.tf still
# points there). See docs/decisions.md.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: homepage
spec:
  interval: 10m
  chart:
    spec:
      chart: homepage
      version: "2.1.0"
      sourceRef:
        kind: HelmRepository
        name: jameswynn
        namespace: homepage
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # Cluster-wide pod/node stats via the Kubernetes API -- needs its own
    # RBAC (read-only, scoped to what the chart's ClusterRole grants),
    # not touching any other app's own ServiceAccount/RBAC.
    enableRbac: true
    serviceAccount:
      create: true

    resources:
      requests:
        cpu: "10m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "128Mi"

    # Required as of this chart/homepage version -- defaults to null,
    # which makes every request fail with "Host validation failed"
    # (200 status, error body -- curl -o /dev/null checks never caught
    # this). Never noticed until actually loading the page in a browser.
    env:
      - name: HOMEPAGE_ALLOWED_HOSTS
        value: demo-app.k8s-homelab.jacobbanghart.com

    config:
      settings:
        title: k8s-homelab
        background:
          color: "#0f172a"
        theme: dark
        headerStyle: clean

      services:
        - Core Infrastructure:
            - Vault:
                href: https://vault.k8s-homelab.jacobbanghart.com
                description: Secrets management (HA Raft, AWS KMS auto-unseal)
                icon: vaultwarden.png
            - Grafana:
                href: https://grafana.k8s-homelab.jacobbanghart.com
                description: Metrics, dashboards, alerting
                icon: grafana.png

      widgets:
        - kubernetes:
            cluster:
              show: true
              cpu: true
              memory: true
              showLabel: true
              label: "cluster"
            nodes:
              show: true
              cpu: true
              memory: true
              showLabel: true
        - search:
            provider: duckduckgo
            target: _blank

      bookmarks: []
