apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "87.12.2"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    # kubeadm bound kube-scheduler/kube-controller-manager/etcd metrics to
    # 127.0.0.1 by default (security hardening in modern kubeadm), which
    # made these ServiceMonitors sit permanently "down". Fixed 2026-07-09
    # by patching the static pod manifests on all 3 masters to bind
    # 0.0.0.0 (ansible/roles/control_plane_metrics/) -- see
    # docs/decisions.md for the writeup. kubeProxy stays disabled: same
    # bind issue, but also moot since this cluster runs Cilium with
    # kube-proxy-replacement=true, so its metrics aren't meaningful here
    # regardless of reachability.
    kubeProxy:
      enabled: false

    alertmanager:
      alertmanagerSpec:
        replicas: 1
        retention: 120h
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: ceph-block
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 2Gi
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"

    prometheus:
      prometheusSpec:
        retention: 15d
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: ceph-block
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 20Gi
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"

    grafana:
      admin:
        existingSecret: grafana-admin-credentials
        userKey: admin-user
        passwordKey: admin-password
      # 2 replicas for node-drain resilience (see docs/decisions.md,
      # 2026-07-21 entry). This only works because state now lives in
      # grafana-postgres (CNPG, see clusters/k8s-homelab-config/cnpg/)
      # instead of the local RWO ceph-block PVC below -- with local RWO
      # storage, 2 replicas would hit the exact same Multi-Attach
      # deadlock the original single-replica Recreate workaround was
      # protecting against, just permanently instead of only during
      # rollouts. Key is deploymentStrategy, not strategy -- the latter
      # is a different (unrelated) top-level key elsewhere in this
      # chart's values tree and silently no-ops if used here instead.
      replicas: 2
      deploymentStrategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 1
          maxUnavailable: 0
      # OIDC via Authentik. client_id isn't secret (it's visible in any
      # browser OAuth redirect anyway) so it's inline here; client_secret
      # comes from Vault (monitoring/grafana-oidc, see
      # grafana-oidc-externalsecret.yaml) via envValueFrom and grafana.ini's
      # $__env{} interpolation -- never committed. See docs/decisions.md
      # for the Authentik Provider/Application setup (web UI only, not
      # declarative -- same as Vault's OIDC app).
      env:
        GF_DATABASE_TYPE: postgres
        GF_DATABASE_HOST: grafana-postgres-rw.monitoring.svc.cluster.local:5432
        GF_DATABASE_NAME: grafana
        GF_DATABASE_SSL_MODE: disable
      envValueFrom:
        GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
          secretKeyRef:
            name: grafana-oidc
            key: CLIENT_SECRET
        GF_DATABASE_USER:
          secretKeyRef:
            name: grafana-postgres-app
            key: username
        GF_DATABASE_PASSWORD:
          secretKeyRef:
            name: grafana-postgres-app
            key: password
      grafana.ini:
        server:
          # Without this, Grafana doesn't know it's behind Traefik's TLS
          # termination and generates OAuth redirect_uris as
          # http://<host>:3000/... (its own internal listener address)
          # instead of the real https public hostname -- which Authentik
          # then rejects as a Redirect URI Error since it doesn't match
          # what's registered on the provider.
          root_url: https://grafana.k8s-homelab.jacobbanghart.com/
        auth.generic_oauth:
          enabled: true
          name: Authentik
          client_id: IBauVMR1df844daScBrZpG78cJHLod286S8rb6ne
          client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
          scopes: "openid email profile"
          auth_url: https://auth.jacobbanghart.com/application/o/authorize/
          token_url: https://auth.jacobbanghart.com/application/o/token/
          api_url: https://auth.jacobbanghart.com/application/o/userinfo/
          redirect_uri: https://grafana.k8s-homelab.jacobbanghart.com/login/generic_oauth
          allow_sign_up: true
          # No role_attribute_path meant every Authentik login (including
          # jacob's own account) got Grafana's default org role, Viewer --
          # which can't use Explore. Pin jacob's account to Admin by email;
          # everyone else stays Viewer.
          role_attribute_path: "email=='jacobmbanghart@gmail.com' && 'Admin' || 'Viewer'"
      # Disabled, not moved to RWX: with 2 replicas, a shared RWO PVC
      # would hit the same Multi-Attach deadlock persistence was already
      # removed to avoid (see deploymentStrategy comment above), and
      # nothing here needs to survive a pod restart anymore -- dashboards
      # come from ConfigMaps via the sidecar, everything else lives in
      # grafana-postgres now.
      persistence:
        enabled: false
      ingress:
        enabled: true
        ingressClassName: traefik
        # Internal admin tool, resolved via Pi-hole only -- keep it off
        # external-dns's public Cloudflare records.
        annotations:
          external-dns.alpha.kubernetes.io/exclude: "true"
        hosts:
          - grafana.k8s-homelab.jacobbanghart.com
        # secretName matches certificate.yaml's cert-manager Certificate
        # (real Let's Encrypt cert via Cloudflare DNS-01). Temporary
        # domain until this app is migrated to its real final hostname.
        tls:
          - secretName: grafana-tls
            hosts:
              - grafana.k8s-homelab.jacobbanghart.com
      resources:
        requests:
          cpu: "50m"
          memory: "128Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"
      additionalDataSources:
        - name: Loki
          type: loki
          access: proxy
          url: http://loki:3100
          isDefault: false
