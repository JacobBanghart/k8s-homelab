apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
  namespace: rook-ceph
spec:
  interval: 10m
  dependsOn:
    - name: rook-ceph
      namespace: rook-ceph
    - name: ceph-csi-drivers
      namespace: rook-ceph
  chart:
    spec:
      chart: rook-ceph-cluster
      version: "v1.20.2"
      sourceRef:
        kind: HelmRepository
        name: rook-release
        namespace: rook-ceph
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    operatorNamespace: rook-ceph

    # 3 masters aren't part of the storage pool (no OSD disk attached to
    # them) — only the 3 workers have the dedicated /dev/sdb added via
    # Terraform for OSD backing.
    cephClusterSpec:
      mon:
        count: 3
        allowMultiplePerNode: false
      mgr:
        count: 2
        allowMultiplePerNode: false
      dashboard:
        enabled: true
      storage:
        useAllNodes: true
        useAllDevices: false
        # sdc added ahead of the dev-cluster migration -- original 3x100GB
        # (one per worker) was too tight against dev's real data footprint
        # once measured directly. See terraform/vms-workers.tf
        # ceph_osd_disk_size_2 and docs/decisions.md.
        deviceFilter: "^sd[bc]$"
      resources:
        mgr:
          limits:
            cpu: "1000m"
            memory: "1Gi"
          requests:
            cpu: "250m"
            memory: "512Mi"
        mon:
          limits:
            cpu: "1000m"
            memory: "1Gi"
          requests:
            cpu: "250m"
            memory: "512Mi"
        osd:
          limits:
            cpu: "1000m"
            memory: "2Gi"
          requests:
            cpu: "250m"
            memory: "1Gi"

    # 3 OSDs (one per worker) -> replicated size 3 gives full one-node-loss
    # tolerance, matching the 3-worker topology.
    cephBlockPools:
      - name: replicapool
        spec:
          failureDomain: host
          replicated:
            size: 3
        storageClass:
          enabled: true
          name: ceph-block
          isDefault: true
          reclaimPolicy: Delete
          allowVolumeExpansion: true
          # Helm replaces list values wholesale rather than deep-merging them,
          # so overriding cephBlockPools at all means these (chart-default)
          # secret parameters must be repeated explicitly here -- omitting
          # them silently drops the CSI provisioner/node secrets entirely,
          # which surfaces as "provided secret is empty" at PVC provision time.
          parameters:
            imageFormat: "2"
            imageFeatures: layering
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: rook-ceph
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: rook-ceph
            csi.storage.k8s.io/controller-publish-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-publish-secret-namespace: rook-ceph
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
            csi.storage.k8s.io/node-stage-secret-namespace: rook-ceph
            csi.storage.k8s.io/fstype: ext4

    # RWX storage -- needed so Traefik's 3 replicas (one per node, for
    # zero-downtime drains) can share one ACME-storage volume for
    # Cloudflare DNS-01 cert issuance. Same replication factor as
    # cephBlockPools above. 2 MDS (1 active + 1 standby) for its own HA,
    # matching the "no single point of failure" pattern used throughout
    # this cluster.
    cephFileSystems:
      - name: cephfs
        spec:
          metadataPool:
            replicated:
              size: 3
          dataPools:
            - name: data0
              failureDomain: host
              replicated:
                size: 3
          metadataServer:
            activeCount: 1
            activeStandby: true
        storageClass:
          enabled: true
          name: ceph-filesystem
          reclaimPolicy: Delete
          allowVolumeExpansion: true
          parameters:
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: rook-ceph
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: rook-ceph
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
            csi.storage.k8s.io/node-stage-secret-namespace: rook-ceph
    cephObjectStores: []

    toolbox:
      enabled: true
