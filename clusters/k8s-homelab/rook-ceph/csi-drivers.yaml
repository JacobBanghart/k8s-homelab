apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ceph-csi-drivers
  namespace: rook-ceph
spec:
  interval: 10m
  dependsOn:
    - name: rook-ceph
      namespace: rook-ceph
  chart:
    spec:
      chart: ceph-csi-drivers
      version: "1.0.4"
      sourceRef:
        kind: HelmRepository
        name: ceph-csi-operator
        namespace: rook-ceph
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  # Rook-recommended overrides (from rook/deploy/charts/ceph-csi-drivers/values.yaml
  # for this chart's matching Rook release) -- driver names are prefixed with the
  # operator namespace to match the provisioner names Rook's StorageClasses expect.
  values:
    operatorConfig:
      namespace: rook-ceph
      driverSpecDefaults:
        imageSet:
          name: rook-csi-operator-image-set-configmap
        nodePlugin:
          priorityClassName: system-node-critical
        controllerPlugin:
          priorityClassName: system-cluster-critical

    # controllerPlugin.replicas/affinity are set per-driver below, NOT
    # under operatorConfig.driverSpecDefaults above -- despite the name,
    # driverSpecDefaults only feeds the separate OperatorConfig CRD
    # (templates/operatorConfig.yaml), which individual Driver CRs never
    # reference. Each Driver CR (templates/driver.yaml) is templated
    # solely from .Values.drivers.<name>.*, and the chart's own
    # values.yaml already hardcodes replicas: 1 at that path per driver
    # -- so a value set only under driverSpecDefaults is silently
    # ineffective. Confirmed by rendering both ways with `helm template`
    # against this chart version before settling on this structure.
    drivers:
      rbd:
        enabled: true
        name: rook-ceph.rbd.csi.ceph.com
        controllerPlugin:
          # 2 replicas (not 3, unlike CNPG/Grafana) -- these are
          # active/passive with leader election, not a quorum, so 2 is
          # enough to survive a single node drain: whichever isn't
          # hosting the drained node keeps serving volume
          # attach/detach/provision requests for every *other* PVC in
          # the cluster while the other reschedules. At replicas: 1
          # (the chart default), a drain of whichever node happened to
          # host this pod stalled every other app's volume reattach for
          # the duration -- the exact problem the rest of tonight's work
          # was trying to fix, just one layer further down.
          replicas: 2
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app: rook-ceph.rbd.csi.ceph.com-ctrlplugin
                    topologyKey: kubernetes.io/hostname
      cephfs:
        enabled: true
        name: rook-ceph.cephfs.csi.ceph.com
        controllerPlugin:
          replicas: 2
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app: rook-ceph.cephfs.csi.ceph.com-ctrlplugin
                    topologyKey: kubernetes.io/hostname
      nfs:
        enabled: false
        name: rook-ceph.nfs.csi.ceph.com
      nvmeof:
        enabled: false
        name: rook-ceph.nvmeof.csi.ceph.com
