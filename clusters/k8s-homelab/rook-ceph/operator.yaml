apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph
  namespace: rook-ceph
spec:
  interval: 10m
  chart:
    spec:
      chart: rook-ceph
      version: "v1.20.2"
      sourceRef:
        kind: HelmRepository
        name: rook-release
        namespace: rook-ceph
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # As of v1.20.1+, CSI settings were removed from this chart entirely --
    # the ceph-csi-operator subchart (installed here) only provides the
    # controller-manager + CRDs. The actual driver instance is created by
    # the separate ceph-csi-drivers chart (see csi-drivers.yaml), which
    # must be installed after this chart.
    resources:
      limits:
        cpu: "500m"
        memory: "512Mi"
      requests:
        cpu: "100m"
        memory: "256Mi"
