# Migrated from dev cluster (Wave 1 of the dev->k8s-homelab migration,
# see docs/decisions.md). Stateless, no PVC, no secrets. Excluded from
# external-dns and dev's copy left fully live -- public app cutover is
# a single router-level event, not per-app (see docs/decisions.md's
# "Public app cutover is one router-level event" entry).
apiVersion: v1
kind: Namespace
metadata:
  name: speedtest
---
apiVersion: v1
kind: Service
metadata:
  name: speedtest
  namespace: speedtest
spec:
  type: ClusterIP
  selector:
    app: speedtest
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: speedtest
  namespace: speedtest
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: speedtest
  template:
    metadata:
      labels:
        app: speedtest
    spec:
      containers:
        - name: speedtest
          image: openspeedtest/latest:v2.0.6
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
          resources:
            requests:
              memory: "200Mi"
              cpu: "200m"
            limits:
              memory: "1000Mi"
              cpu: "2000m"
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: limit
  namespace: speedtest
spec:
  buffering:
    maxRequestBodyBytes: 35000000
    memRequestBodyBytes: 35000000
    maxResponseBodyBytes: 35000000
    memResponseBodyBytes: 35000000
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: speedtest
  namespace: speedtest
  annotations:
    external-dns.alpha.kubernetes.io/exclude: "true"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`speedtest.jacobbanghart.com`)
      kind: Rule
      middlewares:
        - name: limit
      services:
        - name: speedtest
          port: 3000
  tls:
    secretName: speedtest-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: speedtest-tls
  namespace: speedtest
spec:
  secretName: speedtest-tls
  duration: 2160h # 90d
  renewBefore: 360h # 15d
  privateKey:
    algorithm: ECDSA
    size: 256
  dnsNames:
    - speedtest.jacobbanghart.com
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
    group: cert-manager.io
