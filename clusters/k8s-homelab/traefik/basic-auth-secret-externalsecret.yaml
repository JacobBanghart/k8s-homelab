apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: basic-auth-secret
  namespace: traefik
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: basic-auth-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: traefik/basic-auth-secret
