apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 10m
  chart:
    spec:
      chart: traefik
      version: "39.0.7"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: traefik
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    # Real certs via Cloudflare DNS-01 (jacobbanghart.com), same mechanism
    # and account as flux/clusters/k3s-cluster/traefik/traefik.yaml --
    # apps get a temporary *.k8s-homelab.jacobbanghart.com namespace until
    # they're migrated to their real final hostnames. On-demand per-Host()
    # issuance, no static wildcard, matching flux (no default TLSStore
    # anymore -- see clusters/k8s-homelab-config/cert-manager/wildcard-cert.yaml's
    # removal). The self-signed k8s-homelab-ca-issuer still exists for
    # Vault's own internal listener cert (unrelated to this).
    ingressClass:
      enabled: true
      isDefaultClass: true

    ingressRoute:
      dashboard:
        enabled: true
        middlewares:
          - name: basic-auth

    ports:
      web:
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
      websecure:
        http:
          tls:
            enabled: true
            certResolver: cloudflare

    persistence:
      enabled: true
      name: ssl-certs
      path: /ssl-certs
      size: 1Gi
      existingClaim: ssl-certs

    env:
      - name: CF_API_EMAIL
        valueFrom:
          secretKeyRef:
            name: cloudflare-credentials
            key: email
      - name: CF_API_KEY
        valueFrom:
          secretKeyRef:
            name: cloudflare-credentials
            key: apiKey

    additionalArguments:
      - "--certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.cloudflare.acme.email=jacobmbanghart@gmail.com"
      - "--certificatesresolvers.cloudflare.acme.dnschallenge.resolvers=1.1.1.1"
      - "--certificatesresolvers.cloudflare.acme.storage=/ssl-certs/acme-cloudflare.json"

    # Traefik refuses to use the ACME store unless it's exactly 0600 --
    # matters more here than in flux's single-replica setup, since all 3
    # replicas share the same RWX volume and any permission drift on one
    # would affect the others. Matches flux's proven workaround.
    deployment:
      initContainers:
        - name: volume-permissions
          image: busybox:1.38.0
          command:
            - sh
            - -c
            - chmod -Rv 600 /ssl-certs/* || echo oops
          volumeMounts:
            - name: ssl-certs
              mountPath: /ssl-certs

      # 3 replicas, one per worker, so draining any single node still
      # leaves 2 ready endpoints -- zero-downtime drains instead of a gap
      # while a single replacement pod reschedules and passes its
      # readiness probe.
      replicas: 3

    # Default surge-first rollout (maxSurge:1, maxUnavailable:0) deadlocks
    # here: a 4th pod can't schedule under the 1-per-node topology spread
    # constraint below (all 3 workers already have a pod), so it sits
    # Pending until manually intervened. Terminate-first instead: free a
    # node slot before scheduling the replacement.
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 1
        maxSurge: 0

    topologySpreadConstraints:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: traefik
        maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule

    podDisruptionBudget:
      enabled: true
      maxUnavailable: 1

    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
