apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 10m
  chart:
    spec:
      chart: traefik
      version: "39.0.7"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: traefik
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    # Real certs via cert-manager's ACME/Cloudflare DNS-01 ClusterIssuer
    # (clusters/k8s-homelab-config/cert-manager/letsencrypt-cloudflare-issuer.yaml),
    # not Traefik's own built-in ACME -- the traefik chart hard-rejects
    # enabling its built-in ACME with more than 1 replica
    # ("You can not enable acme if you set more than one traefik replica"),
    # which conflicts with the 3-replica zero-downtime-drain setup below.
    # cert-manager sidesteps this entirely: issued certs are stored as
    # regular Kubernetes Secrets, naturally available to all 3 replicas via
    # etcd, no shared file/storage needed. Each app gets its own explicit
    # Certificate resource + secretName (same explicit pattern the old
    # self-signed setup used), not a static default -- apps get a
    # temporary *.k8s-homelab.jacobbanghart.com namespace until they're
    # migrated to their real final hostnames.
    ingressClass:
      enabled: true
      isDefaultClass: true

    ingressRoute:
      dashboard:
        enabled: true
        middlewares:
          - name: basic-auth

    ports:
      web:
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
      websecure:
        http:
          tls:
            enabled: true

    # 3 replicas, one per worker, so draining any single node still leaves
    # 2 ready endpoints -- zero-downtime drains instead of a gap while a
    # single replacement pod reschedules and passes its readiness probe.
    deployment:
      replicas: 3

    # Default surge-first rollout (maxSurge:1, maxUnavailable:0) deadlocks
    # here: a 4th pod can't schedule under the 1-per-node topology spread
    # constraint below (all 3 workers already have a pod), so it sits
    # Pending until manually intervened. Terminate-first instead: free a
    # node slot before scheduling the replacement.
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 1
        maxSurge: 0

    topologySpreadConstraints:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: traefik
        maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule

    podDisruptionBudget:
      enabled: true
      maxUnavailable: 1

    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
