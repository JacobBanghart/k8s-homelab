# Vault handles its own TLS end-to-end (API listener + Raft inter-node
# mTLS) rather than terminating at Traefik -- see ingressroute-tcp.yaml's
# passthrough comment. One shared cert across all 3 pods covers every
# hostname Vault or its clients might dial it by.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-tls
  namespace: vault
spec:
  secretName: vault-tls
  duration: 2160h # 90d
  renewBefore: 360h # 15d
  privateKey:
    algorithm: ECDSA
    size: 256
  dnsNames:
    - vault.k8s-homelab.local
    - vault
    - vault.vault
    - vault.vault.svc
    - vault.vault.svc.cluster.local
    - vault-0.vault-internal
    - vault-1.vault-internal
    - vault-2.vault-internal
    - vault-0.vault-internal.vault.svc.cluster.local
    - vault-1.vault-internal.vault.svc.cluster.local
    - vault-2.vault-internal.vault.svc.cluster.local
    - localhost
  ipAddresses:
    - 127.0.0.1
  issuerRef:
    name: k8s-homelab-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
