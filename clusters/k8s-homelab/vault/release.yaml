apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: vault
spec:
  interval: 10m
  chart:
    spec:
      chart: vault
      version: "0.34.0"
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: vault
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    # No injector -- the only consumer is the primary "dev" cluster, an
    # entirely separate cluster External Secrets Operator talks to over
    # the network (AppRole auth), not pods running inside this cluster.
    injector:
      enabled: false

    server:
      resources:
        requests:
          cpu: "250m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"

      dataStorage:
        enabled: true
        size: 2Gi
        storageClass: ceph-block
        accessMode: ReadWriteOnce

      # cert-manager-issued cert (see certificate.yaml), shared across all
      # 3 pods -- mounted read-only at /vault/userconfig/vault-tls by the
      # chart's extraVolumes convention.
      extraVolumes:
        - type: secret
          name: vault-tls

      # AWS KMS auto-unseal credentials (see
      # k8s-homelab/terraform-aws-kms/ and the one-time bootstrap Secret
      # created from its output) -- never committed to git.
      extraSecretEnvironmentVars:
        - envName: AWS_ACCESS_KEY_ID
          secretName: vault-kms-unseal
          secretKey: AWS_ACCESS_KEY_ID
        - envName: AWS_SECRET_ACCESS_KEY
          secretName: vault-kms-unseal
          secretKey: AWS_SECRET_ACCESS_KEY

      ha:
        enabled: true
        replicas: 3
        raft:
          enabled: true
          setNodeId: true
          # Full custom config (not the chart's default template) because
          # the awskms seal stanza isn't exposed as its own values key.
          # kms_key_id/region come from terraform-aws-kms's outputs.
          config: |
            ui = true

            listener "tcp" {
              address            = "[::]:8200"
              cluster_address    = "[::]:8201"
              tls_cert_file      = "/vault/userconfig/vault-tls/tls.crt"
              tls_key_file       = "/vault/userconfig/vault-tls/tls.key"
              tls_client_ca_file = "/vault/userconfig/vault-tls/ca.crt"
            }

            storage "raft" {
              path = "/vault/data"

              retry_join {
                leader_api_addr     = "https://vault-0.vault-internal:8200"
                leader_ca_cert_file = "/vault/userconfig/vault-tls/ca.crt"
              }
              retry_join {
                leader_api_addr     = "https://vault-1.vault-internal:8200"
                leader_ca_cert_file = "/vault/userconfig/vault-tls/ca.crt"
              }
              retry_join {
                leader_api_addr     = "https://vault-2.vault-internal:8200"
                leader_ca_cert_file = "/vault/userconfig/vault-tls/ca.crt"
              }
            }

            seal "awskms" {
              region     = "us-east-1"
              kms_key_id = "cc9ab78a-7d02-4d1e-8db2-7aaec6acf64d"
            }

            service_registration "kubernetes" {}
